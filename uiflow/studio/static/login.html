<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>uiflow studio - Anmeldung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="/static/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    padding: 32px 32px 28px;
    width: 320px;
  }
  .login-box h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 20px; }
  .login-box label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .login-box input {
    width: 100%;
    padding: 9px 11px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
    font-family: var(--font-sans);
    margin-bottom: 12px;
    transition: border-color 0.2s var(--ease-spring);
  }
  .login-box input:focus-visible { border-color: var(--accent); }
  .login-error { color: var(--danger); font-size: 0.82rem; margin: -6px 0 12px; }
  .login-box .btn-primary { width: 100%; padding: 9px 18px; }
  .login-box .btn-primary::after { display: none; }
</style>
</head>
<body>
<form class="login-box" method="post" action="/login">
  <h1><span style="color:var(--accent)">uiflow</span> studio</h1>
  <label for="login-password">Passwort</label>
  <input id="login-password" type="password" name="password" placeholder="Passwort" autocomplete="current-password" autofocus>
  <div class="login-error hidden" id="login-error" role="alert">Falsches Passwort.</div>
  <button type="submit" class="btn btn-primary">Anmelden</button>
</form>
<script>
  if (new URLSearchParams(location.search).has("error")) {
    document.getElementById("login-error").classList.remove("hidden");
  }
</script>
</body>
</html>
